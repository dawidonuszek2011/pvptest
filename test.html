<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="icon" type="image/x-icon" href="favicon.ico">

<title>PvP Ranking</title>

<style>
  * { box-sizing: border-box; }

:root{
    --bg1:#0f172a;
    --bg2:#020617;
    --card1:rgba(12,24,43,.95);
    --card2:rgba(8,19,35,.95);
    --border:rgba(255,255,255,.06);
    --text:#fff;
    --muted:#93a4ba;
    --accent:#4da3ff;
    --accent2:#1e40af;
    --success:#9df68b;
    --danger:#fca5a5;
    --gold1:#f5c451;
    --gold2:#b8861d;
  }

  body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top, rgba(77,163,255,.12), transparent 30%),
      linear-gradient(180deg,var(--bg1) 0%, var(--bg2) 100%);
    overflow:hidden;
  }

  .topbar{
    min-height:72px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:16px 22px;
    background:rgba(8,15,28,.88);
    border-bottom:1px solid rgba(255,255,255,.05);
    flex-wrap:wrap;
    backdrop-filter: blur(10px);
  }

  .topbar h1{
    margin:0;
    font-size:28px;
    letter-spacing:.5px;
  }

  .legend{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    font-size:13px;
    color:#cbd5e1;
  }

  .legend span{
    background:rgba(255,255,255,.06);
    padding:8px 10px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.05);
  }

  .main{
    height:calc(100vh - 90px);
    overflow-y:auto;
    padding:18px 18px 40px;
  }

  .search-panel{
    max-width:1320px;
    margin:0 auto 18px auto;
    background:linear-gradient(180deg, rgba(15,27,48,.95), rgba(10,20,36,.95));
    border:1px solid var(--border);
    border-radius:20px;
    padding:18px;
    box-shadow:0 12px 32px rgba(0,0,0,.22);
  }

  .search-title{
    font-size:18px;
    font-weight:800;
    margin-bottom:14px;
    color:#f8fafc;
  }

  .search-bar{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:16px;
  }

  .search-bar input{
    flex:1;
    min-width:240px;
    background:#0d1728;
    color:#fff;
    border:1px solid rgba(255,255,255,.08);
    border-radius:14px;
    padding:14px 16px;
    font-size:15px;
    outline:none;
    transition:.2s ease;
  }

  .search-bar input:focus{
    border-color:rgba(77,163,255,.8);
    box-shadow:0 0 0 4px rgba(77,163,255,.12);
  }

  .search-bar button{
    border:none;
    border-radius:14px;
    padding:14px 18px;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
    transition:.2s ease;
  }

  .btn-search{
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff;
  }

  .btn-clear{
    background:rgba(255,255,255,.08);
    color:#fff;
    border:1px solid rgba(255,255,255,.06) !important;
  }

  .search-result{
    display:none;
  }

  .table-head{
    max-width:1320px;
    margin:0 auto 10px auto;
    display:grid;
    grid-template-columns:110px 1.9fr 150px 1.2fr 210px;
    gap:14px;
    color:#64748b;
    font-weight:bold;
    padding:0 10px;
  }

  .ranking{
    max-width:1320px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .player-card{
    display:grid;
    grid-template-columns:110px 1.9fr 150px 1.2fr 210px;
    gap:14px;
    align-items:center;
    background:linear-gradient(180deg, var(--card1), var(--card2));
    border:1px solid rgba(255,255,255,.05);
    border-radius:18px;
    min-height:92px;
    padding:12px 14px;
  }

  .rank-box{
    display:flex;
    align-items:center;
    gap:12px;
    height:68px;
    border-radius:14px;
    overflow:hidden;
    padding-left:12px;
    background:linear-gradient(135deg,#2d3748,#1f2937);
  }

  .rank-box.rank-1{background:linear-gradient(135deg,#f5c451,#b8861d);}
  .rank-box.rank-2{background:linear-gradient(135deg,#d9e1e8,#8e9aa5);}
  .rank-box.rank-3{background:linear-gradient(135deg,#d48a4c,#8f5323);}

  .rank-num{font-size:28px;font-weight:900;color:white;}

  .player-main{display:flex;flex-direction:column;gap:6px;}

  .player-name{
    font-size:22px;
    font-weight:800;
    color:#f8fafc;
  }

  /* 🔥 NEON TOP 3 */
  .player-name.neon-1{
    color:#ffd700;
    text-shadow:0 0 5px #ffd700,0 0 10px #ffd700,0 0 20px #ffae00,0 0 40px #ffae00;
  }

  .player-name.neon-2{
    color:#cfd9ff;
    text-shadow:0 0 5px #cfd9ff,0 0 10px #9db4ff,0 0 20px #7aa2ff,0 0 40px #7aa2ff;
  }

  .player-name.neon-3{
    color:#ffb37a;
    text-shadow:0 0 5px #ffb37a,0 0 10px #ff914d,0 0 20px #ff7a1a,0 0 40px #ff7a1a;
  }

</style>
</head>

<body>

<div class="topbar">
  <h1>PvP Tiers</h1>
</div>

<div class="main">
  <div class="ranking" id="ranking"></div>
</div>

<script>
let allPlayers = [];

function sortPlayers(players){
  return [...players].sort((a,b)=>(b.points||0)-(a.points||0));
}

function renderRanking(players){
  const el = document.getElementById("ranking");
  el.innerHTML = "";

  const sorted = sortPlayers(players);

  sorted.forEach((p,index)=>{
    const rank = index + 1;

    el.innerHTML += `
      <div class="player-card">
        <div class="rank-box ${rank<=3?`rank-${rank}`:""}">
          <div class="rank-num">${rank}.</div>
        </div>

        <div class="player-main">
          <div class="player-name ${rank<=3?`neon-${rank}`:""}">
            ${p.nick}
          </div>
        </div>
      </div>
    `;
  });
}

async function load(){
  const res = await fetch("./players.json");
  allPlayers = await res.json();
  renderRanking(allPlayers);
}

load();
</script>

</body>
</html>
