<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PvP Ranking - Neon Edition</title>
<style>
  * { box-sizing: border-box; }

  :root {
    --bg1:#0f172a;
    --bg2:#020617;
    --card1:rgba(12,24,43,.95);
    --card2:rgba(8,19,35,.95);
    --border:rgba(255,255,255,.06);
    --text:#fff;
    --muted:#93a4ba;
    --accent:#4da3ff;
    --accent2:#1e40af;
    --gold1:#f5c451;
    --silver:#d9e1e8;
    --bronze:#d48a4c;
  }

  body {
    margin:0;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top, rgba(77,163,255,.12), transparent 30%),
      linear-gradient(180deg,var(--bg1) 0%, var(--bg2) 100%);
    min-height: 100vh;
  }

  /* Animacja Neonu */
  @keyframes neonGlow {
    from { text-shadow: 0 0 5px currentColor, 0 0 10px currentColor; }
    to { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor; }
  }

  .neon-1 { color: var(--gold1) !important; animation: neonGlow 1.5s ease-in-out infinite alternate; }
  .neon-2 { color: var(--silver) !important; animation: neonGlow 1.5s ease-in-out infinite alternate; }
  .neon-3 { color: var(--bronze) !important; animation: neonGlow 1.5s ease-in-out infinite alternate; }

  /* Specjalne karty dla TOP 3 */
  .card-rank-1 { border: 1px solid rgba(245, 196, 81, 0.3) !important; box-shadow: 0 0 15px rgba(245, 196, 81, 0.1); }
  .card-rank-2 { border: 1px solid rgba(217, 225, 232, 0.2) !important; }
  .card-rank-3 { border: 1px solid rgba(212, 138, 76, 0.2) !important; }

  .topbar {
    min-height:72px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 22px;
    background:rgba(8,15,28,.88);
    border-bottom:1px solid var(--border);
    backdrop-filter: blur(10px);
  }

  .legend { display:flex; gap:8px; flex-wrap:wrap; font-size:12px; }
  .legend span { background:rgba(255,255,255,.06); padding:6px 10px; border-radius:8px; }

  .main { padding: 20px; max-width: 1320px; margin: 0 auto; }

  .search-panel {
    background: linear-gradient(180deg, rgba(15,27,48,.95), rgba(10,20,36,.95));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 30px;
  }

  .search-bar { display: flex; gap: 10px; margin-top: 15px; }
  .search-bar input {
    flex: 1; background: #0d1728; border: 1px solid var(--border);
    padding: 12px; border-radius: 12px; color: white; outline: none;
  }
  .search-bar input:focus { border-color: var(--accent); }

  .btn-search { background: var(--accent); border: none; padding: 12px 24px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
  .btn-clear { background: rgba(255,255,255,0.1); border: none; padding: 12px 24px; border-radius: 12px; color: white; cursor: pointer; }

  .table-head {
    display: grid;
    grid-template-columns: 110px 1.9fr 150px 1.2fr 210px;
    gap: 14px; padding: 0 15px; margin-bottom: 10px;
    color: var(--muted); font-size: 14px; font-weight: bold;
  }

  .ranking { display: flex; flex-direction: column; gap: 12px; }

  .player-card {
    display: grid;
    grid-template-columns: 110px 1.9fr 150px 1.2fr 210px;
    gap: 14px; align-items: center;
    background: linear-gradient(180deg, var(--card1), var(--card2));
    border: 1px solid var(--border);
    border-radius: 18px; padding: 12px 15px;
    transition: 0.3s;
  }

  .rank-box {
    display: flex; align-items: center; gap: 10px;
    padding: 8px; border-radius: 12px; background: #1e293b;
  }
  .rank-1 { background: linear-gradient(135deg, #f5c451, #b8861d); }
  .rank-2 { background: linear-gradient(135deg, #d9e1e8, #8e9aa5); }
  .rank-3 { background: linear-gradient(135deg, #d48a4c, #8f5323); }

  .rank-num { font-size: 22px; font-weight: 900; width: 30px; text-align: center; }
  .mini-avatar { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }

  .player-name { font-size: 20px; font-weight: 800; }
  
  .region { text-align: center; font-weight: bold; padding: 8px; border-radius: 10px; width: 60px; justify-self: center; }
  .eu { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
  .na { background: rgba(239, 68, 68, 0.2); color: #f87171; }

  .tier { background: #1e293b; padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; color: var(--accent); }

  .points-value { font-size: 24px; font-weight: 900; text-align: right; }

  .search-result { display: none; margin-top: 15px; padding: 15px; border-radius: 12px; border: 1px solid var(--accent); }
  .search-result.show { display: block; animation: fadeIn 0.3s; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 1000px) {
    .table-head { display: none; }
    .player-card { grid-template-columns: 1fr 1fr; }
    .points-value { text-align: left; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>PvP Tiers</h1>
  <div class="legend">
    <span>Grandmaster: 400+</span>
    <span>Master: 250+</span>
    <span>Ace: 100+</span>
  </div>
</div>

<div class="main">
  <div class="search-panel">
    <div style="font-weight: bold;">Szukaj Wojownika</div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Wpisz nick...">
      <button class="btn-search" onclick="searchPlayer()">Szukaj</button>
      <button class="btn-clear" onclick="clearSearch()">Reset</button>
    </div>
    <div id="searchResult" class="search-result"></div>
  </div>

  <div class="table-head">
    <div>Ranga</div>
    <div>Gracz</div>
    <div style="text-align:center">Region</div>
    <div>Tiers</div>
    <div style="text-align:right">Punkty</div>
  </div>

  <div class="ranking" id="rankingContainer"></div>
</div>

<script>
  const players = [
    { rank: 1, name: "Nightshade", region: "EU", tier: "HT1", points: 520, avatar: "https://pravatar.cc" },
    { rank: 2, name: "Vortex", region: "NA", tier: "HT1", points: 485, avatar: "https://pravatar.cc" },
    { rank: 3, name: "Kyuubi", region: "EU", tier: "HT2", points: 310, avatar: "https://pravatar.cc" },
    { rank: 4, name: "Shadow", region: "EU", tier: "HT3", points: 125, avatar: "https://pravatar.cc" },
    { rank: 5, name: "Ghost", region: "NA", tier: "LT1", points: 95, avatar: "https://pravatar.cc" }
  ];

  function renderRanking(data) {
    const container = document.getElementById('rankingContainer');
    container.innerHTML = data.map(p => {
      const isTop3 = p.rank <= 3;
      const neonClass = isTop3 ? `neon-${p.rank}` : '';
      const cardClass = isTop3 ? `card-rank-${p.rank}` : '';
      
      return `
        <div class="player-card ${cardClass}">
          <div class="rank-box rank-${isTop3 ? p.rank : 'default'}">
            <span class="rank-num">#${p.rank}</span>
            <img src="${p.avatar}" class="mini-avatar">
          </div>
          <div class="player-name ${neonClass}">${p.name}</div>
          <div class="region ${p.region.toLowerCase()}">${p.region}</div>
          <div><span class="tier">${p.tier}</span></div>
          <div class="points-value">${p.points}</div>
        </div>
      `;
    }).join('');
  }

  function searchPlayer() {
    const val = document.getElementById('searchInput').value.toLowerCase();
    const res = document.getElementById('searchResult');
    const p = players.find(x => x.name.toLowerCase() === val);
    
    if(p) {
      res.innerHTML = `Znaleziono: <strong>${p.name}</strong> - Pozycja #${p.rank} (${p.points} pkt)`;
      res.className = "search-result show";
    } else {
      res.innerHTML = "Nie znaleziono gracza.";
      res.className = "search-result show";
    }
  }

  function clearSearch() {
    document.getElementById('searchInput').value = "";
    document.getElementById('searchResult').className = "search-result";
  }

  renderRanking(players);
</script>

</body>
</html>
