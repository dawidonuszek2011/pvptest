 <!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/x-icon" href="favicon.ico">
<title>PvP Ranking</title>
<style>
  * { box-sizing: border-box; }

  :root{
    --bg1:#0f172a;
    --bg2:#020617;
    --card1:rgba(12,24,43,.95);
    --card2:rgba(8,19,35,.95);
    --border:rgba(255,255,255,.06);
    --text:#fff;
    --muted:#93a4ba;
    --accent:#4da3ff;
    --accent2:#1e40af;
    --gold1:#f5c451;
    --gold2:#b8861d;
  }

  body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top, rgba(77,163,255,.12), transparent 30%),
      linear-gradient(180deg,var(--bg1) 0%, var(--bg2) 100%);
    overflow-x:hidden;
  }

  /* --- EFEKT NEONU DLA TOP 3 --- */
  @keyframes neonPulse {
    from { text-shadow: 0 0 5px currentColor, 0 0 10px currentColor; }
    to { text-shadow: 0 0 15px currentColor, 0 0 25px currentColor; }
  }

  .neon-1 { color: #f5c451 !important; animation: neonPulse 1.5s infinite alternate; font-weight: 900; }
  .neon-2 { color: #cbd5e1 !important; animation: neonPulse 1.5s infinite alternate; font-weight: 900; }
  .neon-3 { color: #cd7f32 !important; animation: neonPulse 1.5s infinite alternate; font-weight: 900; }

  .topbar{
    min-height:72px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:16px 22px;
    background:rgba(8,15,28,.88);
    border-bottom:1px solid rgba(255,255,255,.05);
    flex-wrap:wrap;
    backdrop-filter: blur(10px);
  }

  .topbar h1{ margin:0; font-size:28px; letter-spacing:.5px; }

  .legend{ display:flex; gap:10px; flex-wrap:wrap; font-size:13px; color:#cbd5e1; }
  .legend span{ background:rgba(255,255,255,.06); padding:8px 10px; border-radius:10px; border:1px solid rgba(255,255,255,.05); }

  .main{ padding:18px 18px 40px; }

  .search-panel{
    max-width:1320px;
    margin:0 auto 18px auto;
    background:linear-gradient(180deg, rgba(15,27,48,.95), rgba(10,20,36,.95));
    border:1px solid var(--border);
    border-radius:20px;
    padding:18px;
    box-shadow:0 12px 32px rgba(0,0,0,.22);
  }

  .search-bar{ display:flex; gap:12px; flex-wrap:wrap; }
  .search-bar input{
    flex:1; min-width:240px; background:#0d1728; color:#fff; border:1px solid rgba(255,255,255,.08);
    border-radius:14px; padding:14px 16px; font-size:15px; outline:none;
  }

  .btn-search{
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff; border:none; border-radius:14px; padding:14px 18px; cursor:pointer; font-weight:800;
  }

  .table-head{
    max-width:1320px; margin:0 auto 10px auto;
    display:grid; grid-template-columns:110px 1.9fr 150px 1.2fr 210px;
    gap:14px; color:#64748b; font-weight:bold; padding:0 10px;
  }

  .ranking{ max-width:1320px; margin:0 auto; display:flex; flex-direction:column; gap:12px; }

  .player-card{
    display:grid; grid-template-columns:110px 1.9fr 150px 1.2fr 210px;
    gap:14px; align-items:center;
    background:linear-gradient(180deg, var(--card1), var(--card2));
    border:1px solid rgba(255,255,255,.05);
    border-radius:18px; min-height:92px; padding:12px 14px;
  }

  .rank-box{
    display:flex; align-items:center; gap:12px; height:68px; border-radius:14px;
    padding-left:12px; background:linear-gradient(135deg,#2d3748,#1f2937);
  }
  .rank-box.rank-1{ background:linear-gradient(135deg,#f5c451,#b8861d); }
  .rank-box.rank-2{ background:linear-gradient(135deg,#d9e1e8,#8e9aa5); }
  .rank-box.rank-3{ background:linear-gradient(135deg,#d48a4c,#8f5323); }

  .rank-num{ font-size:28px; font-weight:900; color:white; }
  .mini-avatar{ width:42px; height:42px; border-radius:8px; object-fit:cover; border:1px solid rgba(255,255,255,.18); }
  .player-name{ font-size:22px; font-weight:800; color:#f8fafc; }

  .region{ text-align:center; font-weight:800; font-size:20px; padding:12px 14px; border-radius:14px; }
  .region.eu{ background:rgba(64,145,63,.28); color:#9df68b; }
  .region.na{ background:rgba(156,57,57,.28); color:#ff8b8b; }

  .tier{ padding:7px 10px; border-radius:12px; font-size:12px; font-weight:800; background:#1b2637; border:1px solid rgba(255,255,255,.06); color:#f9b54a; }
  .points-value{ font-size:28px; font-weight:900; color:#ffffff; text-align:right;}

  @media (max-width: 1100px){
    .table-head{ display:none; }
    .player-card{ grid-template-columns: 1fr; text-align: center; }
    .points-value { text-align: center; }
    .rank-box { justify-content: center; padding-left: 0; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>PvP Tiers</h1>
  <div class="legend">
    <span>Grandmaster: 400+</span>
    <span>Master: 250+</span>
    <span>Ace: 100+</span>
    <span>Specialist: 50+</span>
    <span>Cadet: 20+</span>
    <span>Novice: 10+</span>
  </div>
</div>

<div class="main">
  <div class="search-panel">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Wpisz nick gracza...">
      <button class="btn-search" onclick="searchPlayer()">Szukaj</button>
    </div>
  </div>

  <div class="table-head">
    <div>Ranga</div>
    <div>Gracz</div>
    <div style="text-align:center">Region</div>
    <div>Tier</div>
    <div style="text-align:right">Punkty</div>
  </div>

  <div class="ranking" id="rankingContainer">
    <!-- Dane z players.json trafią tutaj -->
  </div>
</div>

<script>
  let playersData = [];

  // Funkcja pobierająca dane z pliku JSON
  async function loadPlayers() {
    try {
      const response = await fetch('players.json');
      playersData = await response.json();
      // Sortowanie po punktach (na wypadek gdyby JSON nie był posortowany)
      playersData.sort((a, b) => b.points - a.points);
      renderRanking(playersData);
    } catch (error) {
      console.error("Błąd podczas wczytywania players.json:", error);
      document.getElementById('rankingContainer').innerHTML = "<p style='color:red'>Nie udało się wczytać danych z players.json</p>";
    }
  }

  function renderRanking(data) {
    const container = document.getElementById('rankingContainer');
    container.innerHTML = data.map((p, index) => {
      const rank = index + 1;
      // Dodawanie klasy neonowej tylko dla top 1, 2, 3
      let neonClass = "";
      if (rank === 1) neonClass = "neon-1";
      else if (rank === 2) neonClass = "neon-2";
      else if (rank === 3) neonClass = "neon-3";

      return `
        <div class="player-card">
          <div class="rank-box rank-${rank <= 3 ? rank : 'default'}">
            <span class="rank-num">#${rank}</span>
            <img src="${p.avatar || 'https://placeholder.com'}" class="mini-avatar">
          </div>
          <div class="player-name ${neonClass}">${p.name}</div>
          <div class="region ${p.region.toLowerCase()}">${p.region}</div>
          <div><span class="tier">${p.tier}</span></div>
          <div class="points-value">${p.points}</div>
        </div>
      `;
    }).join('');
  }

  function searchPlayer() {
    const val = document.getElementById('searchInput').value.toLowerCase();
    const filtered = playersData.filter(p => p.name.toLowerCase().includes(val));
    renderRanking(filtered);
  }

  // Uruchomienie wczytywania na starcie
  loadPlayers();
</script>

</body>
</html>
