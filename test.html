<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>PvP Ranking | Invite Tier Test</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg1:#0f172a;
      --bg2:#020617;
      --card1:rgba(12,24,43,.95);
      --card2:rgba(8,19,35,.95);
      --border:rgba(255,255,255,.06);
      --text:#fff;
      --muted:#93a4ba;
      --accent:#4da3ff;
      --accent2:#1e40af;
      --success:#9df68b;
      --danger:#fca5a5;
      --gold1:#f5c451;
      --gold2:#b8861d;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, rgba(77,163,255,.12), transparent 30%), linear-gradient(180deg,var(--bg1) 0%, var(--bg2) 100%);
      overflow: hidden;
    }

    .topbar {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 22px;
      background: rgba(8,15,28,.88);
      border-bottom: 1px solid rgba(255,255,255,.05);
      flex-wrap: wrap;
      backdrop-filter: blur(10px);
    }

    .topbar h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: .5px;
    }

    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 13px;
      color: #cbd5e1;
    }

    .legend span {
      background: rgba(255,255,255,.06);
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.05);
    }

    .main {
      height: calc(100vh - 90px);
      overflow-y: auto;
      padding: 18px 18px 40px;
    }

    .search-panel {
      max-width: 1320px;
      margin: 0 auto 18px auto;
      background: linear-gradient(180deg, rgba(15,27,48,.95), rgba(10,20,36,.95));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 12px 32px rgba(0,0,0,.22);
    }

    .search-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 14px;
      color: #f8fafc;
    }

    .search-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .search-bar input {
      flex: 1;
      min-width: 240px;
      background: #0d1728;
      color: #fff;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
      transition: .2s ease;
    }

    .search-bar input:focus {
      border-color: rgba(77,163,255,.8);
      box-shadow: 0 0 0 4px rgba(77,163,255,.12);
    }

    .search-bar button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: .2s ease;
    }

    .btn-search {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    .btn-clear {
      background: rgba(255,255,255,.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,.06) !important;
    }

    /* DISCORD BUTTON */
    .btn-discord {
      background: #5865F2;
      color: white;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
    }

    .btn-discord:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(88,101,242,.25);
    }

    .btn-discord svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .search-result {
      display: none;
      background: linear-gradient(180deg, rgba(10,22,39,.96), rgba(7,18,33,.96));
      border: 1px solid rgba(77,163,255,.22);
      border-radius: 18px;
      padding: 18px;
    }

    .search-result.show {
      display: block;
      animation: fadeIn .25s ease;
    }

    .search-result.not-found {
      border-color: rgba(252,165,165,.22);
    }

    .result-grid {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 16px;
      align-items: center;
    }

    .result-avatar {
      width: 90px;
      height: 90px;
      border-radius: 16px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,.12);
      background: #0f172a;
    }

    .result-name {
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 10px;
    }

    .result-lines {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-line {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: #d7e2f0;
      font-size: 15px;
    }

    .info-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.06);
      font-weight: 700;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <h1>PvP Tiers</h1>

    <button id="infoBtn" style="padding:10px 14px;border-radius:12px;border:none;font-weight:800;cursor:pointer;background:#4da3ff;color:#fff;">
      Informacje
    </button>

    <!-- DISCORD BUTTON ADDED -->
    <button class="btn-discord" onclick="window.open('https://discord.gg/VGusdEPJuz','_blank')">
      <svg viewBox="0 0 24 24">
        <path d="M20.317 4.369a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.211.375-.444.864-.608 1.249a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.249.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.056 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.873-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.9.077.077 0 0 1-.008-.128c.127-.096.254-.195.377-.294a.074.074 0 0 1 .077-.01c3.927 1.793 8.18 1.793 12.061 0a.074.074 0 0 1 .078.009c.123.1.25.2.378.295a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.9.076.076 0 0 0-.04.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.055c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.028z"/>
      </svg>
      Discord
    </button>

    <div class="legend">
      <span>Grandmaster: 400+</span>
      <span>Master: 250+</span>
      <span>Ace: 100+</span>
      <span>Specialist: 50+</span>
      <span>Cadet: 20+</span>
      <span>Novice: 10+</span>
      <span>Rookie: &lt;10</span>
    </div>
  </div>

  <div class="main">
    <div class="search-panel">
      <div class="search-title">Wyszukaj gracza</div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Wpisz nick gracza z listy..." autocomplete="off" />
        <button class="btn-search" id="searchBtn">Wyszukaj gracza</button>
        <button class="btn-clear" id="clearBtn">Wyczyść</button>
      </div>
      <div class="search-result" id="searchResult"></div>
    </div>

    <div class="status" id="status">Ładowanie rankingu...</div>
    <div class="ranking" id="ranking"></div>
  </div>

  <script>
    let allPlayers = [];

    function loadPlayers() {
      fetch("./players.json?v=" + Date.now())
        .then(r => r.json())
        .then(data => {
          allPlayers = data;
          document.getElementById("status").textContent = "Załadowano " + data.length + " graczy.";
        });
    }

    loadPlayers();
  </script>
</body>
</html>
