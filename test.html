<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>PvP Ranking | Invite Tier Test</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg1:#0f172a;
      --bg2:#020617;
      --card1:rgba(12,24,43,.95);
      --card2:rgba(8,19,35,.95);
      --border:rgba(255,255,255,.06);
      --text:#fff;
      --muted:#93a4ba;
      --accent:#4da3ff;
      --accent2:#1e40af;
      --success:#9df68b;
      --danger:#fca5a5;
      --gold1:#f5c451;
      --gold2:#b8861d;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, rgba(77,163,255,.12), transparent 30%), linear-gradient(180deg,var(--bg1) 0%, var(--bg2) 100%);
      overflow: hidden;
    }

    .topbar {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 22px;
      background: rgba(8,15,28,.88);
      border-bottom: 1px solid rgba(255,255,255,.05);
      flex-wrap: wrap;
      backdrop-filter: blur(10px);
    }

    .topbar h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: .5px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .discord-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 900;
      color: #fff;
      background: linear-gradient(135deg,#5865F2,#404EED);
      border: 1px solid rgba(255,255,255,.12);
      transition: .2s ease;
    }

    .discord-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(88,101,242,.25);
    }

    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 13px;
      color: #cbd5e1;
    }

    .legend span {
      background: rgba(255,255,255,.06);
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.05);
    }

    .main {
      height: calc(100vh - 90px);
      overflow-y: auto;
      padding: 18px 18px 40px;
    }

    .search-panel {
      max-width: 1320px;
      margin: 0 auto 18px auto;
      background: linear-gradient(180deg, rgba(15,27,48,.95), rgba(10,20,36,.95));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 12px 32px rgba(0,0,0,.22);
    }

    .search-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 14px;
      color: #f8fafc;
    }

    .search-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .search-bar input {
      flex: 1;
      min-width: 240px;
      background: #0d1728;
      color: #fff;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
      transition: .2s ease;
    }

    .search-bar input:focus {
      border-color: rgba(77,163,255,.8);
      box-shadow: 0 0 0 4px rgba(77,163,255,.12);
    }

    .search-bar button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: .2s ease;
    }

    .btn-search {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    .btn-search:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(30,64,175,.25);
    }

    .btn-clear {
      background: rgba(255,255,255,.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,.06) !important;
    }

    .btn-clear:hover {
      background: rgba(255,255,255,.12);
    }

    /* --- reszta CSS BEZ ZMIAN --- */
  </style>
</head>

<body>
  <div class="topbar">
    <h1>PvP Tiers</h1>

    <div class="topbar-right">
      <button id="infoBtn" style="padding:10px 14px;border-radius:12px;border:none;font-weight:800;cursor:pointer;background:#4da3ff;color:#fff;">
        Informacje
      </button>

      <!-- DISCORD BUTTON -->
      <a class="discord-btn" href="https://discord.gg/VGusdEPJuz" target="_blank">
        <!-- ikonka Discord (SVG) -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.317 4.369A19.791 19.791 0 0016.558 3c-.21.375-.455.88-.623 1.285a18.27 18.27 0 00-5.87 0C9.897 3.88 9.652 3.375 9.442 3A19.79 19.79 0 005.683 4.369C3.268 7.903 2.623 11.332 2.945 14.72c1.637 1.222 3.224 1.97 4.79 2.45.39-.54.736-1.11 1.03-1.71-.56-.21-1.1-.47-1.61-.78.135-.1.27-.2.4-.31 3.1 1.45 6.45 1.45 9.54 0 .13.11.265.21.4.31-.51.31-1.05.57-1.61.78.294.6.64 1.17 1.03 1.71 1.566-.48 3.153-1.228 4.79-2.45.38-3.85-.64-7.25-3.053-10.35zM9.75 13.5c-.69 0-1.25-.63-1.25-1.4 0-.77.56-1.4 1.25-1.4s1.25.63 1.25 1.4c0 .77-.56 1.4-1.25 1.4zm4.5 0c-.69 0-1.25-.63-1.25-1.4 0-.77.56-1.4 1.25-1.4s1.25.63 1.25 1.4c0 .77-.56 1.4-1.25 1.4z"/>
        </svg>
        Discord
      </a>

      <div class="legend">
        <span>Grandmaster: 400+</span>
        <span>Master: 250+</span>
        <span>Ace: 100+</span>
        <span>Specialist: 50+</span>
        <span>Cadet: 20+</span>
        <span>Novice: 10+</span>
        <span>Rookie: &lt;10</span>
      </div>
    </div>
  </div>

  <div class="main">
    <!-- RESZTA TWOJEGO KODU BEZ ZMIAN -->
  </div>

  <!-- RESZTA JS BEZ ZMIAN -->
</body>
</html>
