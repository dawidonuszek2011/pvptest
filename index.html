<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="icon" type="image/x-icon" href="favicon.ico">

<title>PvP Ranking</title>
<style>
  * { box-sizing: border-box; }

:root{
    --bg1:#0f172a;
    --bg2:#020617;
    --card1:rgba(12,24,43,.95);
    --card2:rgba(8,19,35,.95);
    --border:rgba(255,255,255,.06);
    --text:#fff;
    --muted:#93a4ba;
    --accent:#4da3ff;
    --accent2:#1e40af;
    --success:#9df68b;
    --danger:#fca5a5;
    --gold1:#f5c451;
    --gold2:#b8861d;
  }

  body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top, rgba(77,163,255,.12), transparent 30%),
      linear-gradient(180deg,var(--bg1) 0%, var(--bg2) 100%);
    overflow:hidden;
  }

  .topbar{
    min-height:72px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:16px 22px;
    background:rgba(8,15,28,.88);
    border-bottom:1px solid rgba(255,255,255,.05);
    flex-wrap:wrap;
    backdrop-filter: blur(10px);
  }

  .topbar h1{
    margin:0;
    font-size:28px;
    letter-spacing:.5px;
  }

  .legend{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    font-size:13px;
    color:#cbd5e1;
  }

  .legend span{
    background:rgba(255,255,255,.06);
    padding:8px 10px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.05);
  }

  .main{
    height:calc(100vh - 90px);
    overflow-y:auto;
    padding:18px 18px 40px;
  }

  .search-panel{
    max-width:1320px;
    margin:0 auto 18px auto;
    background:linear-gradient(180deg, rgba(15,27,48,.95), rgba(10,20,36,.95));
    border:1px solid var(--border);
    border-radius:20px;
    padding:18px;
    box-shadow:0 12px 32px rgba(0,0,0,.22);
  }

  .search-title{
    font-size:18px;
    font-weight:800;
    margin-bottom:14px;
    color:#f8fafc;
  }

  .search-bar{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:16px;
  }

  .search-bar input{
    flex:1;
    min-width:240px;
    background:#0d1728;
    color:#fff;
    border:1px solid rgba(255,255,255,.08);
    border-radius:14px;
    padding:14px 16px;
    font-size:15px;
    outline:none;
    transition:.2s ease;
  }

  .search-bar input:focus{
    border-color:rgba(77,163,255,.8);
    box-shadow:0 0 0 4px rgba(77,163,255,.12);
  }

  .search-bar button{
    border:none;
    border-radius:14px;
    padding:14px 18px;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
    transition:.2s ease;
  }

  .btn-search{
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff;
  }

  .btn-search:hover{
    transform:translateY(-1px);
    box-shadow:0 10px 24px rgba(30,64,175,.25);
  }

  .btn-clear{
    background:rgba(255,255,255,.08);
    color:#fff;
    border:1px solid rgba(255,255,255,.06) !important;
  }

  .btn-clear:hover{
    background:rgba(255,255,255,.12);
  }

  .search-result{
    display:none;
    background:linear-gradient(180deg, rgba(10,22,39,.96), rgba(7,18,33,.96));
    border:1px solid rgba(77,163,255,.22);
    border-radius:18px;
    padding:18px;
  }

  .search-result.show{
    display:block;
    animation:fadeIn .25s ease;
  }

  .search-result.not-found{
    border-color:rgba(252,165,165,.22);
  }

  .result-grid{
    display:grid;
    grid-template-columns:110px 1fr;
    gap:16px;
    align-items:center;
  }

  .result-avatar{
    width:90px;
    height:90px;
    border-radius:16px;
    object-fit:cover;
    border:1px solid rgba(255,255,255,.12);
    background:#0f172a;
  }

  .result-name{
    font-size:28px;
    font-weight:900;
    color:#fff;
    margin-bottom:10px;
  }

  .result-lines{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .result-line{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    color:#d7e2f0;
    font-size:15px;
  }

  .info-chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:38px;
    padding:8px 12px;
    border-radius:12px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.06);
    font-weight:700;
  }

  .info-chip.region.eu{ background:rgba(64,145,63,.22); color:#9df68b; }
  .info-chip.region.na{ background:rgba(156,57,57,.22); color:#ff8b8b; }
  .info-chip.region.as{ background:rgba(61,101,170,.22); color:#8fc2ff; }
  .info-chip.region.sa{ background:rgba(152,98,39,.22); color:#ffc882; }

  .table-head{
    max-width:1320px;
    margin:0 auto 10px auto;
    display:grid;
    grid-template-columns:110px 1.9fr 150px 1.2fr 210px;
    gap:14px;
    color:#64748b;
    font-weight:bold;
    padding:0 10px;
  }

  .ranking{
    max-width:1320px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .player-card{
    display:grid;
    grid-template-columns:110px 1.9fr 150px 1.2fr 210px;
    gap:14px;
    align-items:center;
    background:linear-gradient(180deg, var(--card1), var(--card2));
    border:1px solid rgba(255,255,255,.05);
    border-radius:18px;
    min-height:92px;
    padding:12px 14px;
    box-shadow:0 10px 30px rgba(0,0,0,.22);
    transition:.2s ease;
  }

  .player-card:hover{
    transform:translateY(-1px);
    border-color:rgba(255,255,255,.09);
  }

  .player-card.highlighted{
    border-color:rgba(77,163,255,.8);
    box-shadow:0 0 0 3px rgba(77,163,255,.14), 0 14px 34px rgba(0,0,0,.28);
  }

  .rank-box{
    display:flex;
    align-items:center;
    gap:12px;
    height:68px;
    border-radius:14px;
    overflow:hidden;
    padding-left:12px;
    position:relative;
    background:linear-gradient(135deg,#2d3748,#1f2937);
  }

  .rank-box.rank-1{ background:linear-gradient(135deg,#f5c451,#b8861d); }
  .rank-box.rank-2{ background:linear-gradient(135deg,#d9e1e8,#8e9aa5); }
  .rank-box.rank-3{ background:linear-gradient(135deg,#d48a4c,#8f5323); }

  .rank-num{
    font-size:28px;
    font-weight:900;
    color:white;
    min-width:34px;
    text-shadow:0 2px 6px rgba(0,0,0,.35);
  }

  .mini-avatar{
    width:42px;
    height:42px;
    border-radius:8px;
    object-fit:cover;
    border:1px solid rgba(255,255,255,.18);
  }

  .player-main{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .player-name{
    font-size:22px;
    font-weight:800;
    color:#f8fafc;
  }

  .player-sub{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    color:#93a4ba;
    font-size:13px;
  }

  .title-badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.06);
    color:#f8d36a;
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
  }

  .region{
    justify-self:center;
    font-weight:800;
    font-size:20px;
    padding:12px 14px;
    border-radius:14px;
    min-width:60px;
    text-align:center;
  }

  .region.eu{ background:rgba(64,145,63,.28); color:#9df68b; }
  .region.na{ background:rgba(156,57,57,.28); color:#ff8b8b; }
  .region.as{ background:rgba(61,101,170,.28); color:#8fc2ff; }
  .region.sa{ background:rgba(152,98,39,.28); color:#ffc882; }

  .tiers{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }

  .tier{
    padding:7px 10px;
    border-radius:12px;
    font-size:12px;
    font-weight:800;
    min-width:52px;
    text-align:center;
    background:#1b2637;
    border:1px solid rgba(255,255,255,.06);
  }

  .ht{ color:#f9b54a; }
  .lt{ color:#bac4d3; }

  .points-box{
    justify-self:end;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:6px;
  }

  .points-value{
    font-size:28px;
    font-weight:900;
    color:#ffffff;
  }

  .points-label{
    font-size:12px;
    color:#7f90a8;
    text-transform:uppercase;
    letter-spacing:1px;
  }

  .status{
    max-width:1320px;
    margin:0 auto 14px auto;
    color:#93a4ba;
    font-size:14px;
    padding:0 10px;
  }

  .error{
    color:#fca5a5;
  }

  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }

  @media (max-width: 1100px){
    .table-head{ display:none; }
    .player-card{
      grid-template-columns:1fr;
      gap:10px;
    }
    .region, .points-box{ justify-self:start; align-items:flex-start; }
    .main{ height:auto; overflow:visible; }
    body{ overflow:auto; }
  }

  @media (max-width: 700px){
    .result-grid{
      grid-template-columns:1fr;
    }
    .result-avatar{
      width:76px;
      height:76px;
    }
    .result-name{
      font-size:24px;
    }
    .search-bar{
      flex-direction:column;
    }
    .search-bar button,
    .search-bar input{
      width:100%;
    }
  }

  /* ===== NEON TOP 3 (DODANE, NIC WIĘCEJ) ===== */

  .top-1 .player-name{
    color:#ffd700;
    text-shadow:
      0 0 6px #ffd700,
      0 0 12px #ffd700,
      0 0 22px #ffb700,
      0 0 40px #ff9900;
  }

  .top-2 .player-name{
    color:#e5e7eb;
    text-shadow:
      0 0 6px #e5e7eb,
      0 0 12px #cbd5e1,
      0 0 22px #9ca3af;
  }

  .top-3 .player-name{
    color:#ffb86b;
    text-shadow:
      0 0 6px #ffb86b,
      0 0 12px #fb923c,
      0 0 22px #ea580c;
  }

</style>
</head>

<body>
  <div class="topbar">
    <h1>PvP Tiers</h1>
    <div class="legend">
      <span>Grandmaster: 400+</span>
      <span>Master: 250+</span>
      <span>Ace: 100+</span>
      <span>Specialist: 50+</span>
      <span>Cadet: 20+</span>
      <span>Novice: 10+</span>
      <span>Rookie: &lt;10</span>
    </div>
  </div>

  <div class="main">
    <div class="ranking" id="ranking"></div>
  </div>

<script>
let allPlayers = [];

function sortPlayers(players){
  return [...players].sort((a,b)=>
    (b.points||0)-(a.points||0)
  );
}

function renderRanking(players){
  const el = document.getElementById("ranking");
  el.innerHTML = "";

  const sorted = sortPlayers(players);

  sorted.forEach((p,index)=>{
    const rank = index + 1;

    const tiersHTML = (p.tiers||[]).map(t=>{
      const type = t.includes("HT") ? "ht" : "lt";
      return `<span class="tier ${type}">${t}</span>`;
    }).join("");

    el.innerHTML += `
      <div class="player-card ${rank<=3 ? "top-"+rank : ""}">

        <div class="rank-box">
          <div class="rank-num">${rank}</div>
          <img class="mini-avatar" src="https://mc-heads.net/avatar/${p.nick}">
        </div>

        <div class="player-name">${p.nick}</div>

        <div>${p.region || "EU"}</div>

        <div>${tiersHTML || "<span class='tier lt'>BRAK</span>"}</div>

        <div>${p.points} pkt</div>
      </div>
    `;
  });
}

async function load(){
  const res = await fetch("./players.json");
  allPlayers = await res.json();
  renderRanking(allPlayers);
}

load();
</script>

</body>
</html>
