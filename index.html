
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PvP Ranking</title>
<style>
  * { box-sizing: border-box; }

  body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    color:#fff;
    background: linear-gradient(180deg,#07111f 0%, #0b1628 100%);
    overflow:hidden;
  }

  .topbar{
    min-height:72px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:16px 22px;
    background:rgba(8,15,28,.82);
    border-bottom:1px solid rgba(255,255,255,.05);
    flex-wrap:wrap;
  }

  .topbar h1{
    margin:0;
    font-size:28px;
    letter-spacing:.5px;
  }

  .legend{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    font-size:13px;
    color:#cbd5e1;
  }

  .legend span{
    background:rgba(255,255,255,.06);
    padding:8px 10px;
    border-radius:10px;
  }

  .main{
    height:calc(100vh - 90px);
    overflow-y:auto;
    padding:18px 18px 40px;
  }

  .table-head{
    max-width:1320px;
    margin:0 auto 10px auto;
    display:grid;
    grid-template-columns:110px 1.9fr 150px 1.2fr 210px;
    gap:14px;
    color:#64748b;
    font-weight:bold;
    padding:0 10px;
  }

  .ranking{
    max-width:1320px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .player-card{
    display:grid;
    grid-template-columns:110px 1.9fr 150px 1.2fr 210px;
    gap:14px;
    align-items:center;
    background:linear-gradient(180deg, rgba(12,24,43,.95), rgba(8,19,35,.95));
    border:1px solid rgba(255,255,255,.05);
    border-radius:18px;
    min-height:92px;
    padding:12px 14px;
    box-shadow:0 10px 30px rgba(0,0,0,.22);
  }

  .rank-box{
    display:flex;
    align-items:center;
    gap:12px;
    height:68px;
    border-radius:14px;
    overflow:hidden;
    padding-left:12px;
    position:relative;
    background:linear-gradient(135deg,#2d3748,#1f2937);
  }

  .rank-box.rank-1{ background:linear-gradient(135deg,#f5c451,#b8861d); }
  .rank-box.rank-2{ background:linear-gradient(135deg,#d9e1e8,#8e9aa5); }
  .rank-box.rank-3{ background:linear-gradient(135deg,#d48a4c,#8f5323); }

  .rank-num{
    font-size:28px;
    font-weight:900;
    color:white;
    min-width:34px;
    text-shadow:0 2px 6px rgba(0,0,0,.35);
  }

  .mini-avatar{
    width:42px;
    height:42px;
    border-radius:8px;
    object-fit:cover;
    border:1px solid rgba(255,255,255,.18);
  }

  .player-main{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .player-name{
    font-size:22px;
    font-weight:800;
    color:#f8fafc;
  }

  .player-sub{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    color:#93a4ba;
    font-size:13px;
  }

  .title-badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.06);
    color:#f8d36a;
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
  }

  .region{
    justify-self:center;
    font-weight:800;
    font-size:20px;
    padding:12px 14px;
    border-radius:14px;
    min-width:60px;
    text-align:center;
  }

  .region.eu{ background:rgba(64,145,63,.28); color:#9df68b; }
  .region.na{ background:rgba(156,57,57,.28); color:#ff8b8b; }
  .region.as{ background:rgba(61,101,170,.28); color:#8fc2ff; }
  .region.sa{ background:rgba(152,98,39,.28); color:#ffc882; }

  .tiers{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }

  .tier{
    padding:7px 10px;
    border-radius:12px;
    font-size:12px;
    font-weight:800;
    min-width:52px;
    text-align:center;
    background:#1b2637;
    border:1px solid rgba(255,255,255,.06);
  }

  .ht{ color:#f9b54a; }
  .lt{ color:#bac4d3; }

  .points-box{
    justify-self:end;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:6px;
  }

  .points-value{
    font-size:28px;
    font-weight:900;
    color:#ffffff;
  }

  .points-label{
    font-size:12px;
    color:#7f90a8;
    text-transform:uppercase;
    letter-spacing:1px;
  }

  .status{
    max-width:1320px;
    margin:0 auto 14px auto;
    color:#93a4ba;
    font-size:14px;
    padding:0 10px;
  }

  .error{
    color:#fca5a5;
  }

  @media (max-width: 1100px){
    .table-head{ display:none; }
    .player-card{
      grid-template-columns:1fr;
      gap:10px;
    }
    .region, .points-box{ justify-self:start; align-items:flex-start; }
    .main{ height:auto; overflow:visible; }
    body{ overflow:auto; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <h1>PvP Ranking</h1>
    <div class="legend">
      <span>Grandmaster: 400+</span>
      <span>Master: 250+</span>
      <span>Ace: 100+</span>
      <span>Specialist: 50+</span>
      <span>Cadet: 20+</span>
      <span>Novice: 10+</span>
      <span>Rookie: &lt;10</span>
    </div>
  </div>

  <div class="main">
    <div class="status" id="status">Ładowanie rankingu...</div>

    <div class="table-head">
      <div>#</div>
      <div>PLAYER</div>
      <div>REGION</div>
      <div>TIERS</div>
      <div style="text-align:right;">POINTS</div>
    </div>

    <div class="ranking" id="ranking"></div>
  </div>

<script>
  function getTitle(points) {
    if (points >= 400) return "Combat Grandmaster";
    if (points >= 250) return "Combat Master";
    if (points >= 100) return "Combat Ace";
    if (points >= 50) return "Combat Specialist";
    if (points >= 20) return "Combat Cadet";
    if (points >= 10) return "Combat Novice";
    return "Rookie";
  }

  function regionClass(region) {
    return String(region || "EU").toLowerCase();
  }

  function sortPlayers(players) {
    return [...players].sort((a, b) => {
      if ((b.points || 0) !== (a.points || 0)) return (b.points || 0) - (a.points || 0);
      return String(a.nick || "").localeCompare(String(b.nick || ""));
    });
  }

  function renderRanking(players) {
    const rankingEl = document.getElementById("ranking");
    rankingEl.innerHTML = "";

    const sorted = sortPlayers(players);

    sorted.forEach((p, index) => {
      const rank = index + 1;
      const title = getTitle(Number(p.points) || 0);
      const tiersHTML = (p.tiers || []).map(t => {
        const type = String(t).includes("HT") ? "ht" : "lt";
        return `<span class="tier ${type}">${t}</span>`;
      }).join("");

      rankingEl.innerHTML += `
        <div class="player-card">
          <div class="rank-box ${rank <= 3 ? `rank-${rank}` : ""}">
            <div class="rank-num">${rank}.</div>
            <img class="mini-avatar" src="${p.avatar || `https://mc-heads.net/avatar/${encodeURIComponent(p.nick)}`}" alt="${p.nick}">
          </div>

          <div class="player-main">
            <div class="player-name">${p.nick}</div>
            <div class="player-sub">
              <span class="title-badge">✦ ${title}</span>
              <span>(${p.points || 0} points)</span>
            </div>
          </div>

          <div class="region ${regionClass(p.region)}">${p.region || "EU"}</div>

          <div class="tiers">${tiersHTML || '<span class="tier lt">BRAK</span>'}</div>

          <div class="points-box">
            <div class="points-value">${p.points || 0}</div>
            <div class="points-label">Combat Points</div>
          </div>
        </div>
      `;
    });
  }

  async function loadPlayers() {
    const status = document.getElementById("status");
    try {
      const response = await fetch("./players.json?v=" + Date.now(), { cache: "no-store" });
      if (!response.ok) {
        throw new Error("Nie udało się wczytać players.json");
      }

      const players = await response.json();

      if (!Array.isArray(players)) {
        throw new Error("players.json ma zły format");
      }

      renderRanking(players);
      status.textContent = `Załadowano ${players.length} graczy.`;
    } catch (err) {
      status.classList.add("error");
      status.textContent = "Błąd: " + err.message;
    }
  }

  loadPlayers();
</script>
</body>
</html>
