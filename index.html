<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PvP Ranking Tabs</title>
<style>
  * { box-sizing: border-box; }

  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(180deg,#0f172a,#020617);
    color:#fff;
    overflow-x:hidden;
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 18px;
    background:rgba(8,15,28,.9);
    border-bottom:1px solid rgba(255,255,255,.08);
    flex-wrap:wrap;
  }

  .title{
    font-size:20px;
    font-weight:900;
    letter-spacing:.5px;
  }

  .tabs{
    display:flex;
    gap:10px;
    margin-left:auto;
  }

  .tab{
    padding:10px 14px;
    border-radius:12px;
    background:rgba(255,255,255,.06);
    cursor:pointer;
    font-weight:800;
    transition:.2s;
    user-select:none;
  }

  .tab.active{
    background:linear-gradient(135deg,#4da3ff,#1e40af);
    box-shadow:0 0 14px rgba(77,163,255,.35);
  }

  .container{
    max-width:1100px;
    margin:0 auto;
    padding:18px;
  }

  .search-box{
    display:flex;
    gap:10px;
    margin-bottom:14px;
  }

  .search-box input{
    flex:1;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.12);
    background:#0b1220;
    color:#fff;
    outline:none;
  }

  .search-btn{
    padding:8px 12px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-weight:800;
    background:linear-gradient(135deg,#4da3ff,#1e40af);
    color:white;
    font-size:13px;
  }

  .search-btn:hover{ transform:translateY(-1px); }

  .player-card{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(17,27,46,.9);
    border:1px solid rgba(255,255,255,.06);
    padding:12px 14px;
    border-radius:14px;
    margin-bottom:10px;
    transition:.2s;
  }

  .player-card:hover{
    transform:translateY(-2px);
    border-color:rgba(255,255,255,.15);
  }

  .name{ font-weight:900; }

  .points{ color:#93a4ba; font-weight:700; }

  .neon{
    color:#fff;
    text-shadow:
      0 0 5px #4da3ff,
      0 0 10px #4da3ff,
      0 0 20px #1e40af;
  }

  .info-box{
    background:rgba(17,27,46,.9);
    border:1px solid rgba(255,255,255,.08);
    padding:14px;
    border-radius:14px;
    line-height:1.6;
  }

</style>
</head>
<body>

<div class="topbar">
  <div class="title">PvP Ranking</div>

  <div class="tabs">
    <div class="tab active" id="infoTab" onclick="toggleInfo()">Informacje</div>
  </div>
</div>

<div class="container">

  <div class="search-box">
    <input id="searchInput" placeholder="Szukaj gracza...">
    <button class="search-btn" onclick="searchPlayer()">Szukaj</button>
  </div>

  <div id="list"></div>
</div>

<script>
let allPlayers = [];
let showInfo = false;

function toggleInfo(){
  showInfo = !showInfo;

  const tab = document.getElementById('infoTab');
  tab.classList.toggle('active');

  render();
}

function loadPlayers(){
  fetch('./players.json?v=' + Date.now())
    .then(r=>r.json())
    .then(data=>{
      allPlayers = data;
      render();
    });
}

function searchPlayer(){
  const val = document.getElementById('searchInput').value.toLowerCase();
  if(!val) return render();

  const filtered = allPlayers.filter(p => (p.nick || '').toLowerCase().includes(val));
  render(filtered);
}

function render(customList){
  const list = document.getElementById('list');
  list.innerHTML = '';

  if(showInfo){
    list.innerHTML = `
      <div class="info-box">
        <b>System rang:</b><br><br>
        Grandmaster: 400+<br>
        Master: 250+<br>
        Ace: 100+<br>
        Specialist: 50+<br>
        Cadet: 20+<br>
        Novice: 10+<br>
        Rookie: <10<br>
      </div>
    `;
    return;
  }

  let players = (customList || allPlayers)
    .sort((a,b)=>(b.points||0)-(a.points||0));

  players.forEach((p,i)=>{
    const isTop3 = i < 3;
    const nameClass = isTop3 ? 'neon' : '';

    list.innerHTML += `
      <div class="player-card">
        <div class="name ${nameClass}">#${i+1} ${p.nick}</div>
        <div class="points">${p.points || 0} pts</div>
      </div>
    `;
  });
}

loadPlayers();
</script>

</body>
</html>
