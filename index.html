
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>PvP Ranking</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg,#0b1220,#0f172a);
    color:white;
}

.container{
    max-width:1100px;
    margin:40px auto;
    padding:10px;
}

/* ===== PLAYER CARD ===== */
.player{
    display:flex;
    align-items:center;
    background:rgba(20,30,50,0.8);
    border-radius:18px;
    padding:14px;
    margin-bottom:14px;
    backdrop-filter: blur(6px);
    border:1px solid rgba(255,255,255,0.05);
    transition:0.2s;
}

.player:hover{
    transform:scale(1.01);
    background:rgba(30,45,70,0.9);
}

.rank{
    font-size:36px;
    font-weight:bold;
    width:70px;
    text-align:center;
    color:#facc15;
}

.avatar{
    width:60px;
    height:60px;
    border-radius:10px;
    margin-right:15px;
}

.info{
    flex:1;
}

.name{
    font-size:20px;
    font-weight:bold;
}

.points{
    font-size:13px;
    color:#94a3b8;
}

/* ===== REGION ===== */
.region{
    padding:6px 12px;
    border-radius:10px;
    font-weight:bold;
    margin-right:20px;
}

.eu{ background:#14532d; }
.na{ background:#7f1d1d; }

/* ===== TIERS ===== */
.tiers{
    display:flex;
    gap:6px;
}

.tier{
    background:#1e293b;
    padding:6px 10px;
    border-radius:10px;
    font-size:12px;
    display:flex;
    align-items:center;
    gap:5px;
}

.ht{ color:#f59e0b; }
.lt{ color:#9ca3af; }

/* ===== LEGEND ===== */
.legend{
    margin-top:40px;
    background:#111827;
    padding:20px;
    border-radius:14px;
}

.legend-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:10px 0;
}

.badge{
    background:#1f2937;
    padding:6px 12px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container" id="ranking"></div>

<div class="container legend">
    <div class="legend-row"><b>🏆 Tier 1</b> <span class="badge">↑ 60 Points</span> <span class="badge">↑ 45 Points</span></div>
    <div class="legend-row"><b>🥈 Tier 2</b> <span class="badge">↑ 30 Points</span> <span class="badge">↑ 20 Points</span></div>
    <div class="legend-row"><b>🥉 Tier 3</b> <span class="badge">↑ 10 Points</span> <span class="badge">↑ 6 Points</span></div>
    <div class="legend-row"><b>Tier 4</b> <span class="badge">↑ 4 Points</span> <span class="badge">↑ 3 Points</span></div>
    <div class="legend-row"><b>Tier 5</b> <span class="badge">↑ 2 Points</span> <span class="badge">↑ 1 Point</span></div>
</div>

<script>
const players = [
  {
    rank:1,
    nick:"xKapa_",
    points:330,
    region:"EU",
    avatar:"https://mc-heads.net/avatar/xKapa_",
    tiers:["HT5","HT5","HT5","HT5","LT5"]
  },
  {
    rank:2,
    nick:"Invite__",
    points:311,
    region:"EU",
    avatar:"https://mc-heads.net/avatar/Invite__",
    tiers:["LT1","LT1","LT1","HT2","LT3","HT1"]
  },
  {
    rank:3,
    nick:"Just_Melon",
    points:290,
    region:"EU",
    avatar:"https://mc-heads.net/avatar/Just_Melon",
    tiers:["HT1","HT1","LT2","HT3","LT3"]
  },
  {
    rank:4,
    nick:"Miauek_",
    points:245,
    region:"EU",
    avatar:"https://mc-heads.net/avatar/Miauek_",
    tiers:["LT1","LT2","HT3","HT1"]
  }
    {
    rank:5,
    nick:"cusiq",
    points:121,
    region:"EU",
    avatar:"https://mc-heads.net/avatar/cusiq",
    tiers:["LT1","LT1","LT1","HT2","LT3","HT1"]
  },
];

const container = document.getElementById("ranking");

players.forEach(p=>{
    let tiersHTML = "";

    p.tiers.forEach(t=>{
        let type = t.includes("HT") ? "ht" : "lt";
        tiersHTML += `<div class="tier ${type}">${t}</div>`;
    });

    let regionClass = p.region.toLowerCase();

    container.innerHTML += `
        <div class="player">
            <div class="rank">#${p.rank}</div>
            <img class="avatar" src="${p.avatar}">
            <div class="info">
                <div class="name">${p.nick}</div>
                <div class="points">Combat Master (${p.points} points)</div>
            </div>
            <div class="region ${regionClass}">${p.region}</div>
            <div class="tiers">${tiersHTML}</div>
        </div>
    `;
});
</script>

</body>
</html>
