<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PvP Ranking</title>

<style>
body{
    background:#0b1020;
    font-family: Arial, Helvetica, sans-serif;
    color:white;
    margin:0;
}

header{
    background:#111827;
    padding:25px;
    font-size:32px;
    font-weight:bold;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.container{
    max-width:900px;
    margin:auto;
    padding:25px;
}

.player-card{
    background:#1f2937;
    border-radius:16px;
    padding:18px;
    margin-bottom:18px;
    display:flex;
    align-items:center;
    gap:18px;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
    transition:0.2s;
}
.player-card:hover{
    transform:scale(1.02);
}

.rank{
    font-size:34px;
    font-weight:bold;
    color:#facc15;
    width:60px;
}

.avatar{
    width:75px;
    height:75px;
    border-radius:12px;
}

.player-info{
    flex:1;
}

.name{
    font-size:22px;
    font-weight:bold;
}

.region{
    background:#16a34a;
    padding:4px 10px;
    border-radius:8px;
    font-size:12px;
    margin-left:10px;
}

.tiers{
    margin-top:12px;
}

.tier{
    display:inline-block;
    padding:6px 11px;
    border-radius:8px;
    margin:3px;
    font-size:13px;
    font-weight:bold;
}

.ht{ background:#f59e0b; }
.lt{ background:#6b7280; }

footer{
    text-align:center;
    padding:20px;
    opacity:0.6;
    font-size:14px;
}
</style>
</head>

<body>

<header>🏆 PvP Ranking</header>
<div class="container" id="ranking"></div>
<footer>Unofficial PvP Leaderboard</footer>

<script>
const players = [
  {rank:1,nick:"Invite",region:"EU",avatar:"https://mc-heads.net/avatar/Invite",tiers:["HT1","HT2","HT3","HT1"]},
  {rank:2,nick:"ItzReal",region:"NA",avatar:"https://mc-heads.net/avatar/ItzReal",tiers:["HT3","HT1","HT1","LT2"]%7D,
  {rank:3,nick:"coldified",region:"EU",avatar:"https://mc-heads.net/avatar/coldified",tiers:["LT1","LT1","HT2","LT3"]%7D,
  {rank:4,nick:"Miedziu",region:"EU",avatar:"https://mc-heads.net/avatar/Miedziu",tiers:["LT2","LT2","HT1"]%7D,
  {rank:5,nick:"Medo",region:"EU",avatar:"https://mc-heads.net/avatar/Medo",tiers:["LT3","LT2","LT1"]%7D
];

const container = document.getElementById("ranking");

players.forEach(p => {
  let tiersHTML = "";
  p.tiers.forEach(t=>{
    let type = t.includes("HT") ? "ht" : "lt";
    tiersHTML += <span class="tier ${type}">${t}</span>;
  });

  container.innerHTML += 
    <div class="player-card">
        <div class="rank">#${p.rank}</div>
        <img class="avatar" src="${p.avatar}">
        <div class="player-info">
            <div class="name">${p.nick}
                <span class="region">${p.region}</span>
            </div>
            <div class="tiers">${tiersHTML}</div>
        </div>
    </div>
  ;
});
</script>

</body>
</html>
