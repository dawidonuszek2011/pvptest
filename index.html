<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>PvP Ranking</title>

<style>
body{
    background:#0f172a;
    font-family: Arial, Helvetica, sans-serif;
    color:white;
    margin:0;
}

header{
    background:#111827;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    text-align:center;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.player-card{
    background:#1f2937;
    border-radius:14px;
    padding:15px;
    margin-bottom:20px;
    display:flex;
    align-items:center;
    gap:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.rank{
    font-size:32px;
    font-weight:bold;
    color:#facc15;
}

.avatar{
    width:70px;
    height:70px;
    border-radius:10px;
}

.player-info{
    flex:1;
}

.name{
    font-size:22px;
    font-weight:bold;
}

.region{
    background:#16a34a;
    padding:4px 10px;
    border-radius:8px;
    font-size:12px;
    margin-left:10px;
}

.tiers{
    margin-top:10px;
}

.tier{
    display:inline-block;
    background:#111827;
    padding:6px 10px;
    border-radius:8px;
    margin:3px;
    font-size:13px;
}

.ht{ background:#f59e0b; }
.lt{ background:#6b7280; }
</style>
</head>

<body>

<header>PvP Ranking</header>

<div class="container" id="ranking"></div>

<script>
const players = [
  {
    rank:1,
    nick:"ItzReal",
    region:"NA",
    avatar:"https://mc-heads.net/avatar/ItzReal",
    tiers:["HT3","HT1","HT1","HT1","LT2"]
  },
  {
    rank:2,
    nick:"coldified",
    region:"EU",
    avatar:"https://mc-heads.net/avatar/coldified",
    tiers:["LT1","LT1","LT1","HT2","LT3","HT1"]
  }
];

const container = document.getElementById("ranking");

players.forEach(p => {
  let tiersHTML = "";

  p.tiers.forEach(t => {
    let type = t.includes("HT") ? "ht" : "lt";
    tiersHTML += `<span class="tier ${type}">${t}</span>`;
  });

  container.innerHTML += `
    <div class="player-card">
        <div class="rank">#${p.rank}</div>
        <img class="avatar" src="${p.avatar}" alt="${p.nick}">
        <div class="player-info">
            <div class="name">${p.nick}
                <span class="region">${p.region}</span>
            </div>
            <div class="tiers">${tiersHTML}</div>
        </div>
    </div>
  `;
});
</script>

</body>
</html>
