
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="icon" type="image/x-icon" href="favicon.ico">

<title>PvP Tier</title>
<style>
  * { box-sizing: border-box; }

:root{
    --bg1:#0f172a;
    --bg2:#020617;
    --card1:rgba(12,24,43,.95);
    --card2:rgba(8,19,35,.95);
    --border:rgba(255,255,255,.06);
    --text:#fff;
    --muted:#93a4ba;
    --accent:#4da3ff;
    --accent2:#1e40af;
    --success:#9df68b;
    --danger:#fca5a5;
    --gold1:#f5c451;
    --gold2:#b8861d;
  }

  body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top, rgba(77,163,255,.12), transparent 30%),
      linear-gradient(180deg,var(--bg1) 0%, var(--bg2) 100%);
    overflow:hidden;
  }

  .topbar{
    min-height:72px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:16px 22px;
    background:rgba(8,15,28,.88);
    border-bottom:1px solid rgba(255,255,255,.05);
    flex-wrap:wrap;
    backdrop-filter: blur(10px);
  }

  .topbar h1{
    margin:0;
    font-size:28px;
    letter-spacing:.5px;
  }

  .legend{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    font-size:13px;
    color:#cbd5e1;
  }

  .legend span{
    background:rgba(255,255,255,.06);
    padding:8px 10px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.05);
  }

  .main{
    height:calc(100vh - 90px);
    overflow-y:auto;
    padding:18px 18px 40px;
  }

  .search-panel{
    max-width:1320px;
    margin:0 auto 18px auto;
    background:linear-gradient(180deg, rgba(15,27,48,.95), rgba(10,20,36,.95));
    border:1px solid var(--border);
    border-radius:20px;
    padding:18px;
    box-shadow:0 12px 32px rgba(0,0,0,.22);
  }

  .search-title{
    font-size:18px;
    font-weight:800;
    margin-bottom:14px;
    color:#f8fafc;
  }

  .search-bar{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:16px;
  }

  .search-bar input{
    flex:1;
    min-width:240px;
    background:#0d1728;
    color:#fff;
    border:1px solid rgba(255,255,255,.08);
    border-radius:14px;
    padding:14px 16px;
    font-size:15px;
    outline:none;
    transition:.2s ease;
  }

  .search-bar input:focus{
    border-color:rgba(77,163,255,.8);
    box-shadow:0 0 0 4px rgba(77,163,255,.12);
  }

  .search-bar button{
    border:none;
    border-radius:14px;
    padding:14px 18px;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
    transition:.2s ease;
  }

  .btn-search{
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff;
  }

  .btn-search:hover{
    transform:translateY(-1px);
    box-shadow:0 10px 24px rgba(30,64,175,.25);
  }

  .btn-clear{
    background:rgba(255,255,255,.08);
    color:#fff;
    border:1px solid rgba(255,255,255,.06) !important;
  }

  .btn-clear:hover{
    background:rgba(255,255,255,.12);
  }

  .search-result{
    display:none;
    background:linear-gradient(180deg, rgba(10,22,39,.96), rgba(7,18,33,.96));
    border:1px solid rgba(77,163,255,.22);
    border-radius:18px;
    padding:18px;
  }

  .search-result.show{
    display:block;
    animation:fadeIn .25s ease;
  }

  .search-result.not-found{
    border-color:rgba(252,165,165,.22);
  }

  .result-grid{
    display:grid;
    grid-template-columns:110px 1fr;
    gap:16px;
    align-items:center;
  }

  .result-avatar{
    width:90px;
    height:90px;
    border-radius:16px;
    object-fit:cover;
    border:1px solid rgba(255,255,255,.12);
    background:#0f172a;
  }

  .result-name{
    font-size:28px;
    font-weight:900;
    color:#fff;
    margin-bottom:10px;
  }

  .result-lines{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .result-line{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    color:#d7e2f0;
    font-size:15px;
  }

  .info-chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:38px;
    padding:8px 12px;
    border-radius:12px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.06);
    font-weight:700;
  }

  .info-chip.region.eu{ background:rgba(64,145,63,.22); color:#9df68b; }
  .info-chip.region.na{ background:rgba(156,57,57,.22); color:#ff8b8b; }
  .info-chip.region.as{ background:rgba(61,101,170,.22); color:#8fc2ff; }
  .info-chip.region.sa{ background:rgba(152,98,39,.22); color:#ffc882; }

  .table-head{
    max-width:1320px;
    margin:0 auto 10px auto;
    display:grid;
    grid-template-columns:110px 1.9fr 150px 1.2fr 210px;
    gap:14px;
    color:#64748b;
    font-weight:bold;
    padding:0 10px;
  }

  .ranking{
    max-width:1320px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .player-card{
    display:grid;
    grid-template-columns:110px 1.9fr 150px 1.2fr 210px;
    gap:14px;
    align-items:center;
    background:linear-gradient(180deg, var(--card1), var(--card2));
    border:1px solid rgba(255,255,255,.05);
    border-radius:18px;
    min-height:92px;
    padding:12px 14px;
    box-shadow:0 10px 30px rgba(0,0,0,.22);
    transition:.2s ease;
  }

  .player-card:hover{
    transform:translateY(-1px);
    border-color:rgba(255,255,255,.09);
  }

  .player-card.highlighted{
    border-color:rgba(77,163,255,.8);
    box-shadow:0 0 0 3px rgba(77,163,255,.14), 0 14px 34px rgba(0,0,0,.28);
  }

  .rank-box{
    display:flex;
    align-items:center;
    gap:12px;
    height:68px;
    border-radius:14px;
    overflow:hidden;
    padding-left:12px;
    position:relative;
    background:linear-gradient(135deg,#2d3748,#1f2937);
  }

  .rank-box.rank-1{ background:linear-gradient(135deg,#f5c451,#b8861d); }
  .rank-box.rank-2{ background:linear-gradient(135deg,#d9e1e8,#8e9aa5); }
  .rank-box.rank-3{ background:linear-gradient(135deg,#d48a4c,#8f5323); }

  .rank-num{
    font-size:28px;
    font-weight:900;
    color:white;
    min-width:34px;
    text-shadow:0 2px 6px rgba(0,0,0,.35);
  }

  .mini-avatar{
    width:42px;
    height:42px;
    border-radius:8px;
    object-fit:cover;
    border:1px solid rgba(255,255,255,.18);
  }

  .player-main{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .player-name{
    font-size:22px;
    font-weight:800;
    color:#f8fafc;
  }

  .player-sub{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    color:#93a4ba;
    font-size:13px;
  }

  .title-badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.06);
    color:#f8d36a;
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
  }

  .region{
    justify-self:center;
    font-weight:800;
    font-size:20px;
    padding:12px 14px;
    border-radius:14px;
    min-width:60px;
    text-align:center;
  }

  .region.eu{ background:rgba(64,145,63,.28); color:#9df68b; }
  .region.na{ background:rgba(156,57,57,.28); color:#ff8b8b; }
  .region.as{ background:rgba(61,101,170,.28); color:#8fc2ff; }
  .region.sa{ background:rgba(152,98,39,.28); color:#ffc882; }

  .tiers{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }

  .tier{
    padding:7px 10px;
    border-radius:12px;
    font-size:12px;
    font-weight:800;
    min-width:52px;
    text-align:center;
    background:#1b2637;
    border:1px solid rgba(255,255,255,.06);
  }

  .ht{ color:#f9b54a; }
  .lt{ color:#bac4d3; }

  .points-box{
    justify-self:end;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:6px;
  }

  .points-value{
    font-size:28px;
    font-weight:900;
    color:#ffffff;
  }

  .points-label{
    font-size:12px;
    color:#7f90a8;
    text-transform:uppercase;
    letter-spacing:1px;
  }

  .status{
    max-width:1320px;
    margin:0 auto 14px auto;
    color:#93a4ba;
    font-size:14px;
    padding:0 10px;
  }

  .error{
    color:#fca5a5;
  }

  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }

  @media (max-width: 1100px){
    .table-head{ display:none; }
    .player-card{
      grid-template-columns:1fr;
      gap:10px;
    }
    .region, .points-box{ justify-self:start; align-items:flex-start; }
    .main{ height:auto; overflow:visible; }
    body{ overflow:auto; }
  }

  @media (max-width: 700px){
    .result-grid{
      grid-template-columns:1fr;
    }
    .result-avatar{
      width:76px;
      height:76px;
    }
    .result-name{
      font-size:24px;
    }
    .search-bar{
      flex-direction:column;
    }
    .search-bar button,
    .search-bar input{
      width:100%;
    }
  }
</style>
</head>
<body>
  <div class="topbar">
    <h1>PvP Ranking</h1>
    <div class="legend">
      <span>Grandmaster: 400+</span>
      <span>Master: 250+</span>
      <span>Ace: 100+</span>
      <span>Specialist: 50+</span>
      <span>Cadet: 20+</span>
      <span>Novice: 10+</span>
      <span>Rookie: &lt;10</span>
    </div>
  </div>

  <div class="main">

    <div class="search-panel">
      <div class="search-title">Wyszukaj gracza</div>

      <div class="search-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="Wpisz nick gracza z listy..."
          autocomplete="off"
        />
        <button class="btn-search" id="searchBtn">Wyszukaj gracza</button>
        <button class="btn-clear" id="clearBtn">Wyczyść</button>
      </div>

      <div class="search-result" id="searchResult"></div>
    </div>

    <div class="status" id="status">Ładowanie rankingu...</div>

    <div class="table-head">
      <div>#</div>
      <div>PLAYER</div>
      <div>REGION</div>
      <div>TIERS</div>
      <div style="text-align:right;">POINTS</div>
    </div>

    <div class="ranking" id="ranking"></div>
  </div>

<script>
  let allPlayers = [];

  function getTitle(points) {
    if (points >= 400) return "Combat Grandmaster";
    if (points >= 250) return "Combat Master";
    if (points >= 100) return "Combat Ace";
    if (points >= 50) return "Combat Specialist";
    if (points >= 20) return "Combat Cadet";
    if (points >= 10) return "Combat Novice";
    return "Rookie";
  }

  function regionClass(region) {
    return String(region || "EU").toLowerCase();
  }

  function escapeHtml(text) {
    return String(text ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function sortPlayers(players) {
    return [...players].sort((a, b) => {
      if ((b.points || 0) !== (a.points || 0)) return (b.points || 0) - (a.points || 0);
      return String(a.nick || "").localeCompare(String(b.nick || ""));
    });
  }

  function getPlayerRank(players, nick) {
    const sorted = sortPlayers(players);
    return sorted.findIndex(p => String(p.nick).toLowerCase() === String(nick).toLowerCase()) + 1;
  }

  function renderRanking(players, highlightedNick = "") {
    const rankingEl = document.getElementById("ranking");
    rankingEl.innerHTML = "";

    const sorted = sortPlayers(players);

    sorted.forEach((p, index) => {
      const rank = index + 1;
      const title = getTitle(Number(p.points) || 0);
      const isHighlighted = String(p.nick || "").toLowerCase() === String(highlightedNick || "").toLowerCase();

      const tiersHTML = (Array.isArray(p.tiers) ? p.tiers : []).map(t => {
        const type = String(t).includes("HT") ? "ht" : "lt";
        return `<span class="tier ${type}">${escapeHtml(t)}</span>`;
      }).join("");

      rankingEl.innerHTML += `
        <div class="player-card ${isHighlighted ? "highlighted" : ""}" id="player-${encodeURIComponent(p.nick || "")}">
          <div class="rank-box ${rank <= 3 ? `rank-${rank}` : ""}">
            <div class="rank-num">${rank}.</div>
            <img class="mini-avatar" src="${escapeHtml(p.avatar || `https://mc-heads.net/avatar/${encodeURIComponent(p.nick)}`)}" alt="${escapeHtml(p.nick)}">
          </div>

          <div class="player-main">
            <div class="player-name">${escapeHtml(p.nick)}</div>
            <div class="player-sub">
              <span class="title-badge">✦ ${escapeHtml(title)}</span>
              <span>(${Number(p.points) || 0} points)</span>
            </div>
          </div>

          <div class="region ${regionClass(p.region)}">${escapeHtml(p.region || "EU")}</div>

          <div class="tiers">${tiersHTML || '<span class="tier lt">BRAK</span>'}</div>

          <div class="points-box">
            <div class="points-value">${Number(p.points) || 0}</div>
            <div class="points-label">Combat Points</div>
          </div>
        </div>
      `;
    });
  }

  function showSearchResult(player) {
    const result = document.getElementById("searchResult");
    const rank = getPlayerRank(allPlayers, player.nick);
    const title = getTitle(Number(player.points) || 0);

    const tiersHTML = (Array.isArray(player.tiers) ? player.tiers : []).length
      ? player.tiers.map(t => {
          const type = String(t).includes("HT") ? "ht" : "lt";
          return `<span class="tier ${type}">${escapeHtml(t)}</span>`;
        }).join("")
      : '<span class="tier lt">BRAK</span>';

    result.className = "search-result show";
    result.innerHTML = `
      <div class="result-grid">
        <img class="result-avatar" src="${escapeHtml(player.avatar || `https://mc-heads.net/avatar/${encodeURIComponent(player.nick)}`)}" alt="${escapeHtml(player.nick)}">

        <div>
          <div class="result-name">${escapeHtml(player.nick)}</div>

          <div class="result-lines">
            <div class="result-line">
              <span class="info-chip">Nick: ${escapeHtml(player.nick)}</span>
            </div>

            <div class="result-line">
              <span class="info-chip region ${regionClass(player.region)}">Region: ${escapeHtml(player.region || "EU")}</span>
            </div>

            <div class="result-line">
              <span class="info-chip">Punkty: ${Number(player.points) || 0}</span>
              <span class="info-chip">Ranking: #${rank}</span>
              <span class="info-chip">Tytuł: ${escapeHtml(title)}</span>
            </div>

            <div class="result-line">
              <span class="info-chip">Tiery:</span>
              <div class="tiers">${tiersHTML}</div>
            </div>
          </div>
        </div>
      </div>
    `;

    renderRanking(allPlayers, player.nick);

    const card = document.getElementById("player-" + encodeURIComponent(player.nick || ""));
    if (card) {
      card.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  }

  function showNotFound(nick) {
    const result = document.getElementById("searchResult");
    result.className = "search-result show not-found";
    result.innerHTML = `
      <div class="result-name" style="font-size:22px; margin-bottom:8px;">Nie znaleziono gracza</div>
      <div style="color:#cbd5e1; font-size:15px;">
        Nick <b>${escapeHtml(nick)}</b> nie istnieje w aktualnej liście graczy.
      </div>
    `;
    renderRanking(allPlayers);
  }

  function searchPlayer() {
    const input = document.getElementById("searchInput");
    const nick = input.value.trim();

    if (!nick) {
      document.getElementById("searchResult").className = "search-result";
      document.getElementById("searchResult").innerHTML = "";
      renderRanking(allPlayers);
      return;
    }

    const found = allPlayers.find(p =>
      String(p.nick || "").toLowerCase() === nick.toLowerCase()
    );

    if (found) {
      showSearchResult(found);
    } else {
      showNotFound(nick);
    }
  }

  function clearSearch() {
    document.getElementById("searchInput").value = "";
    document.getElementById("searchResult").className = "search-result";
    document.getElementById("searchResult").innerHTML = "";
    renderRanking(allPlayers);
  }

  async function loadPlayers() {
    const status = document.getElementById("status");
    try {
      const response = await fetch("./players.json?v=" + Date.now(), { cache: "no-store" });
      if (!response.ok) {
        throw new Error("Nie udało się wczytać players.json");
      }

      const players = await response.json();

      if (!Array.isArray(players)) {
        throw new Error("players.json ma zły format");
      }

      allPlayers = players;
      renderRanking(players);
      status.textContent = `Załadowano ${players.length} graczy.`;
    } catch (err) {
      status.classList.add("error");
      status.textContent = "Błąd: " + err.message;
    }
  }

  document.getElementById("searchBtn").addEventListener("click", searchPlayer);
  document.getElementById("clearBtn").addEventListener("click", clearSearch);
  document.getElementById("searchInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      searchPlayer();
    }
  });

  loadPlayers();
</script>
</body>
</html>
