
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>PvP Ranking</title>
<style>
body{font-family:Arial;background:#0b1220;color:white;margin:0;padding:20px}
.player{background:#1e293b;margin:10px 0;padding:10px;border-radius:10px}
</style>
</head>
<body>
<h1>PvP Ranking</h1>
<div id="ranking"></div>

<script>
async function loadPlayers(){
  const res = await fetch("/.netlify/functions/players");
  const players = await res.json();

  players.sort((a,b)=>b.points-a.points);

  const el = document.getElementById("ranking");
  el.innerHTML = "";

  players.forEach((p,i)=>{
    el.innerHTML += `<div class="player">
      <b>#${i+1} ${p.nick}</b> (${p.points} pkt)
    </div>`;
  });
}

loadPlayers();
</script>
</body>
</html>
