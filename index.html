DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="icon" type="image/x-icon" href="favicon.ico">

<title>PvP Ranking</title>

<style>
  * { box-sizing: border-box; }

  :root{
    --bg1:#0f172a;
    --bg2:#020617;
    --card1:rgba(12,24,43,.95);
    --card2:rgba(8,19,35,.95);
    --border:rgba(255,255,255,.06);
    --text:#fff;
  }

  body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    color:var(--text);
    background: linear-gradient(180deg,var(--bg1),var(--bg2));
    overflow:hidden;
  }

  .main{
    height:100vh;
    overflow:auto;
    padding:20px;
  }

  .player-card{
    display:grid;
    grid-template-columns:110px 1.9fr 150px 1.2fr 210px;
    gap:14px;
    align-items:center;
    background:linear-gradient(180deg,var(--card1),var(--card2));
    border:1px solid var(--border);
    border-radius:16px;
    padding:12px;
    margin-bottom:10px;
  }

  .player-name{
    font-size:22px;
    font-weight:800;
    color:#fff;
  }

  .mini-avatar{
    width:42px;
    height:42px;
    border-radius:8px;
  }

  .tier{
    padding:6px 10px;
    border-radius:10px;
    font-size:12px;
    background:#1b2637;
    margin-right:4px;
    display:inline-block;
  }

  .ht{ color:#f9b54a; }
  .lt{ color:#bac4d3; }

  /* ===== NEON TOP 3 ===== */

  .top-1 .player-name{
    color:#ffd700;
    text-shadow:0 0 6px #ffd700,0 0 12px #ffd700,0 0 25px #ffb700;
  }

  .top-2 .player-name{
    color:#e5e7eb;
    text-shadow:0 0 6px #e5e7eb,0 0 12px #cbd5e1;
  }

  .top-3 .player-name{
    color:#ffb86b;
    text-shadow:0 0 6px #ffb86b,0 0 12px #fb923c;
  }

</style>
</head>

<body>

<div class="main">
  <div id="ranking"></div>
</div>

<script>
let allPlayers = [];

function sortPlayers(players){
  return [...players].sort((a,b)=> (b.points||0)-(a.points||0));
}

function renderRanking(players){
  const el = document.getElementById("ranking");
  el.innerHTML = "";

  const sorted = sortPlayers(players);

  sorted.forEach((p,index)=>{
    const rank = index + 1;

    const tiersHTML = (p.tiers||[]).map(t=>{
      const type = t.includes("HT") ? "ht" : "lt";
      return `<span class="tier ${type}">${t}</span>`;
    }).join("");

    el.innerHTML += `
      <div class="player-card ${rank<=3 ? "top-"+rank : ""}">
        
        <div>
          ${rank}.
          <img class="mini-avatar" src="https://mc-heads.net/avatar/${p.nick}">
        </div>

        <div class="player-name">${p.nick}</div>

        <div>${p.region || "EU"}</div>

        <div>${tiersHTML || "<span class='tier lt'>BRAK</span>"}</div>

        <div>${p.points} pkt</div>
      </div>
    `;
  });
}

async function load(){
  const res = await fetch("./players.json");
  allPlayers = await res.json();
  renderRanking(allPlayers);
}

load();
</script>

</body>
</html>
